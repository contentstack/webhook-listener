# This workflow will publish a package to the NPM registry when a release is created.
# It uses npm Trusted Publishing (OIDC) instead of a long-lived NPM_TOKEN secret.
# See: https://docs.npmjs.com/trusted-publishers/

name: Publish package to NPM repository
on:
  release:
    types: [created]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC / Trusted Publishing
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"
      # Trusted Publishing requires npm 11.5.1 or later.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build-ts
      - run: npm publish --tag latest --access public
